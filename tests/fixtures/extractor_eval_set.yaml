# Extractor eval set — 15 representative URLs for the sprint-18 TinyFish
# rollout. Categories chosen to mirror the kinds of articles the research
# phase actually feeds to the enrichment fallback chain.
#
# Each entry:
#   id:           short slug, used as CSV row key
#   category:     fixture taxonomy — see _CATEGORIES below
#   url:          live URL. Replace with archived snapshot if rot is a problem.
#   golden_text:  five short, distinctive sentence-fragments that MUST appear
#                 in any good extraction. Used to compute content_recall.
#                 Prefer fragments unlikely to appear in nav/sidebar.
#
# Run with:
#   uv run python scripts/eval_extractors.py \
#       --fixture tests/fixtures/extractor_eval_set.yaml \
#       --extractors httpx,playwright,tinyfish \
#       --out sessions/eval-tinyfish-$(date -u +%Y-%m-%d).csv
#
# `golden_text` fragments are placeholders — fill in by hand on first run from
# the best-of-three extractions, then commit so future runs measure regression.

categories_legend:
  - soft_paywall            # NYT/WaPo/FT-style metered access
  - hard_paywall            # LRB/New Yorker behind login
  - cloudflare_substack     # Substack with CF challenge
  - js_heavy_spa            # Talk of the Town / NYer interactive
  - static_blog             # plain HTML
  - arxiv_landing           # JS-light, PDF-link page
  - jsonld_news             # has structured articleBody
  - infinite_scroll         # twitter-like feeds
  - geoblocked              # FT or similar
  - slow_render             # heavy JS but eventually settles
  - reddit_thread           # reddit.com new-style
  - github_readme           # github.com/org/repo
  - youtube_transcript      # youtube.com/watch transcript page
  - bluesky_post            # bsky.app posts
  - plain_correspondence    # an Obsidian-published note or similar

