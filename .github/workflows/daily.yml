name: Jeeves — Daily Pipeline

# Single daily entry-point.  Runs correspondence → research → write in
# sequence so each phase can consume the previous phase's committed output.
#
# All three phases run on separate runners (needs: dependency) so GitHub
# Actions can parallelize setup, but execution is strictly sequential.
#
# Timeline (UTC / PDT):
#   12:00 UTC (5:00 AM PDT) — correspondence starts  (~40 min)
#   ~12:40 UTC              — research starts         (≤65 min)
#   ~13:45 UTC              — write starts            (≤60 min)
#   ~14:45 UTC              — pipeline complete
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: "Run date YYYY-MM-DD (blank = today UTC)"
        required: false
        default: ""
      skip_send:
        description: "Run all phases but do not send any email"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Phase 4 — Correspondence
  # ─────────────────────────────────────────────────────────────────────────
  correspondence:
    name: Correspondence
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Sync dependencies
        run: uv sync --no-dev

      # Preflight Gmail OAuth refresh-token check. Fails fast on invalid_grant
      # (permanent revoke / Testing-mode 7-day expiry) and sends an out-of-band
      # alert via GMAIL_APP_PASSWORD before research/write get queued. Without
      # this, a dead refresh token silently kills the whole day's pipeline.
      #
      # Exit codes from scripts/check_gmail_oauth.py:
      #   0  ok
      #   2  invalid_grant — permanent (token revoked or expired)
      #   3  other auth error — transient (Google outage etc.)
      #   4  missing env vars / unparseable token JSON
      - name: Preflight Gmail OAuth
        env:
          GMAIL_OAUTH_TOKEN_JSON: ${{ secrets.GMAIL_OAUTH_TOKEN_JSON }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          JEEVES_RECIPIENT_EMAIL: ${{ vars.JEEVES_RECIPIENT_EMAIL || 'lang.mc@gmail.com' }}
        run: |
          set +e
          uv run python scripts/check_gmail_oauth.py
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::notice::Gmail OAuth preflight ok"
            exit 0
          fi
          if [ "$rc" -eq 2 ]; then
            echo "::error::Gmail OAuth refresh token is invalid_grant (revoked or expired). Alert email sent. Mint a fresh token via scripts/gmail_auth.py and update GMAIL_OAUTH_TOKEN_JSON."
          else
            echo "::error::Gmail OAuth preflight failed with exit code $rc — see step output for details."
          fi
          exit "$rc"

      - name: Run correspondence phase
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_OAUTH_TOKEN_JSON: ${{ secrets.GMAIL_OAUTH_TOKEN_JSON }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          JEEVES_RECIPIENT_EMAIL: ${{ vars.JEEVES_RECIPIENT_EMAIL || 'lang.mc@gmail.com' }}
        run: |
          uv run python scripts/correspondence.py \
            ${{ github.event.inputs.date && format('--date {0}', github.event.inputs.date) || '' }} \
            ${{ github.event.inputs.skip_send == 'true' && '--skip-send' || '' }}

      - name: Commit correspondence handoff JSON + HTML
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ls sessions/correspondence-*.json >/dev/null 2>&1 || ls sessions/correspondence-*.html >/dev/null 2>&1; then
            git config user.name "jeeves-bot"
            git config user.email "jeeves-bot@users.noreply.github.com"
            git add sessions/correspondence-*.json sessions/correspondence-*.html 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "correspondence $(date -u +%Y-%m-%d)"
              git pull --rebase --autostash origin "${{ github.ref_name }}" || true
              git push
            fi
          fi

      - name: Upload correspondence HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: correspondence-html
          path: sessions/correspondence-*.html
          if-no-files-found: ignore
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2 — Research  (needs correspondence so it sees the handoff JSON)
  # ─────────────────────────────────────────────────────────────────────────
  research:
    name: Research
    needs: correspondence
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Sync dependencies
        run: uv sync --no-dev --extra vertex --extra playwright

      - name: Install Playwright Chromium (headless-shell only)
        # Universal article-fetch fallback (jeeves/tools/playwright_extractor.py).
        # Used by talk_of_the_town, enrichment, tavily_extract, and the
        # `playwright_extract` agent tool. Soft-fails when absent, but in
        # production we want it present so the fallback path can fire.
        # `--only-shell` ships chromium-headless-shell (~30% smaller, faster
        # cold-start) instead of the full chromium binary. We never need
        # rendering/screenshots — only DOM extraction.
        timeout-minutes: 8
        run: uv run python -m playwright install --with-deps --only-shell chromium

      - name: Run research phase
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_REGION: ${{ secrets.GOOGLE_CLOUD_REGION || 'us-central1' }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # ── Sprint-18 TinyFish canary (managed extractor). Defaults: shadow
          # OFF, active OFF — pipeline behaves exactly as pre-sprint when both
          # vars are empty. Flip via repo Variables to promote.
          TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
          JEEVES_TINYFISH_SHADOW: ${{ vars.JEEVES_TINYFISH_SHADOW || '' }}
          JEEVES_USE_TINYFISH: ${{ vars.JEEVES_USE_TINYFISH || '' }}
          # ── Sprint-19 slice D (search-agent canaries). Each tool registers
          # only when its flag is set. All default-off.
          JEEVES_USE_JINA_SEARCH: ${{ vars.JEEVES_USE_JINA_SEARCH || '' }}
          JEEVES_USE_JINA_DEEPSEARCH: ${{ vars.JEEVES_USE_JINA_DEEPSEARCH || '' }}
          JEEVES_USE_JINA_RERANK: ${{ vars.JEEVES_USE_JINA_RERANK || '' }}
          JEEVES_USE_TINYFISH_SEARCH: ${{ vars.JEEVES_USE_TINYFISH_SEARCH || '' }}
          JEEVES_USE_PLAYWRIGHT_SEARCH: ${{ vars.JEEVES_USE_PLAYWRIGHT_SEARCH || '' }}
          # ── Sprint-19 slice E (telemetry + search-shadow). Telemetry writes
          # one JSONL line per tool call to sessions/telemetry-<utc>.jsonl.
          # Shadow flags fire peer providers in parallel after serper_search
          # and write to sessions/shadow-search-<provider>-<utc>.jsonl. All
          # default-off; production output is bit-identical when unset.
          JEEVES_TELEMETRY: ${{ vars.JEEVES_TELEMETRY || '' }}
          JEEVES_JINA_SEARCH_SHADOW: ${{ vars.JEEVES_JINA_SEARCH_SHADOW || '' }}
          JEEVES_TINYFISH_SEARCH_SHADOW: ${{ vars.JEEVES_TINYFISH_SEARCH_SHADOW || '' }}
          JEEVES_PLAYWRIGHT_SEARCH_SHADOW: ${{ vars.JEEVES_PLAYWRIGHT_SEARCH_SHADOW || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: uv run python scripts/research.py

      - name: Commit quota ledger + shadow + telemetry jsonl
        # Bundles four classes of artifact into one commit:
        #   .quota-state.json                       (ledger snapshot)
        #   sessions/shadow-tinyfish-<date>.jsonl   (sprint-18 extract shadow)
        #   sessions/shadow-search-<provider>-<date>.jsonl  (slice-E search shadows)
        #   sessions/telemetry-<date>.jsonl         (slice-E tool-call stream)
        # All append-only per-day; in-tree storage keeps offline analysis
        # cheap (rg / jq pipelines).
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STAGED=0
          if [ -f .quota-state.json ] && ! git diff --quiet .quota-state.json; then
            git add .quota-state.json
            STAGED=1
          fi
          for pattern in 'sessions/shadow-tinyfish-*.jsonl' 'sessions/shadow-search-*.jsonl' 'sessions/telemetry-*.jsonl'; do
            if ls $pattern >/dev/null 2>&1; then
              git add $pattern 2>/dev/null || true
              if ! git diff --cached --quiet -- $pattern; then
                STAGED=1
              fi
            fi
          done
          if [ "$STAGED" = "1" ]; then
            git config user.name "jeeves-bot"
            git config user.email "jeeves-bot@users.noreply.github.com"
            git commit -m "quota: update counters $(date -u +%Y-%m-%d)"
            # The research script commits session-*.json to GitHub via the Contents API,
            # leaving untracked copies in the working tree. Remove them before rebase so
            # git-pull --rebase can checkout the remote's session commit without aborting.
            git clean -fd sessions/ 2>/dev/null || true
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            git push
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 3 — Write  (needs research so it sees the session JSON)
  # ─────────────────────────────────────────────────────────────────────────
  write:
    name: Write
    needs: research
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Sync dependencies
        run: uv sync --no-dev

      - name: Run write phase
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # 2026-05-12 — Cerebras tier-2 narrative-editor fallback. The
          # secret had been in GitHub Secrets since 2026-05-06 but was
          # never plumbed to the write step's env, so cfg.cerebras_api_key
          # was always "" and GATE C tier-2 was always skipped. Adding the
          # passthrough so Cerebras actually fires when OR tier-1 fails.
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          JEEVES_RECIPIENT_EMAIL: ${{ vars.JEEVES_RECIPIENT_EMAIL || 'lang.mc@gmail.com' }}
        run: |
          uv run python scripts/write.py \
            ${{ github.event.inputs.date && format('--date {0}', github.event.inputs.date) || '' }} \
            ${{ github.event.inputs.skip_send == 'true' && '--skip-send' || '' }}

      - name: Upload briefing HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-html
          path: sessions/briefing-*.html
          if-no-files-found: ignore
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 5 — Auditor  (sprint-21: detect + optionally fix + optionally re-send)
  #
  # Runs after write completes. Always runs the detector and commits
  # sessions/audit-<date>.json. When JEEVES_AUDITOR_AUTO_FIX=1 is set in
  # repo Variables, also runs the fixer (deterministic + LLM-backed) and
  # commits the revised briefing. When JEEVES_AUDITOR_RESEND=1 is set,
  # re-sends the email after fixes.
  #
  # Default posture: detection-only + commit audit JSON. Fixes off.
  # Re-send off. Promote step-by-step after the audit JSON shows clean
  # records for 7 days.
  # ─────────────────────────────────────────────────────────────────────────
  auditor:
    name: Auditor
    needs: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Don't block the run if write was retried — we still want to audit
    # whatever briefing landed.
    if: always() && needs.write.result != 'cancelled'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Sync dependencies
        run: uv sync --no-dev

      - name: Run audit (detection)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Reasoning-first model picker overrides; both optional.
          JEEVES_AUDIT_MODEL: ${{ vars.JEEVES_AUDIT_MODEL || '' }}
          JEEVES_AUDIT_MODELS: ${{ vars.JEEVES_AUDIT_MODELS || '' }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          echo "Auditing date: $DATE"
          uv run python scripts/audit.py --date "$DATE" || echo "audit non-zero — continuing"

      - name: Run audit fix (gated)
        if: ${{ vars.JEEVES_AUDITOR_AUTO_FIX == '1' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          JEEVES_AUDIT_MODEL: ${{ vars.JEEVES_AUDIT_MODEL || '' }}
          JEEVES_AUDIT_MODELS: ${{ vars.JEEVES_AUDIT_MODELS || '' }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          echo "Fixing date: $DATE"
          uv run python scripts/audit_fix.py --date "$DATE" || echo "fix non-zero — continuing"

      - name: Re-run audit on revised briefing (gated)
        if: ${{ vars.JEEVES_AUDITOR_AUTO_FIX == '1' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # 2026-05-08 hardening — guard the cp/mv chain against missing
          # inputs. When write skipped (e.g. correspondence crashed), audit.py
          # exits non-zero with no audit-<DATE>.json on disk; the previous
          # `cp` then crashed under set -e and reported the auditor as failed
          # even though the actual failure was upstream.
          set -e
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          if [ ! -f "sessions/audit-$DATE.json" ]; then
            echo "::warning::no sessions/audit-$DATE.json — upstream phase likely failed; skipping post-fix re-audit"
            exit 0
          fi
          if [ ! -f "sessions/briefing-$DATE.html" ]; then
            echo "::warning::no sessions/briefing-$DATE.html — nothing to re-audit; skipping"
            exit 0
          fi
          # F-009 — preserve pre-fix audit JSON; write post-fix counts to a
          # separate file so the forensic record stays intact.
          cp "sessions/audit-$DATE.json" "sessions/audit-$DATE.original.json"
          # Capture re-audit exit so we can decide what to do with the temp files.
          set +e
          uv run python scripts/audit.py --date "$DATE" --no-llm
          rc=$?
          set -e
          if [ "$rc" -ne 0 ] || [ ! -f "sessions/audit-$DATE.json" ]; then
            echo "::warning::post-fix audit.py exited $rc or produced no JSON — restoring original audit JSON"
            mv "sessions/audit-$DATE.original.json" "sessions/audit-$DATE.json"
            exit 0
          fi
          mv "sessions/audit-$DATE.json" "sessions/audit-$DATE.post-fix.json"
          mv "sessions/audit-$DATE.original.json" "sessions/audit-$DATE.json"

      - name: Gate commit on auditor improvement
        if: ${{ vars.JEEVES_AUDITOR_AUTO_FIX == '1' }}
        run: |
          # F-009 — defensive default: assume revert. Any unhandled error
          # below leaves AUDITOR_REVERT=1, so re-send is conservatively
          # blocked (re-send step requires env.AUDITOR_REVERT != '1').
          # Only the explicit "post < pre" branch flips this to 0.
          echo "AUDITOR_REVERT=1" >> $GITHUB_ENV
          set -euo pipefail
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          if [ ! -f sessions/audit-$DATE.post-fix.json ]; then
            echo "::warning::no post-fix audit JSON — gate inconclusive, treating as revert"
            exit 0
          fi
          if ! command -v jq >/dev/null 2>&1; then
            echo "::warning::jq not available on runner — gate cannot evaluate, treating as revert"
            exit 0
          fi
          # F-009 schema-shape check — both files MUST have .defects as an array.
          # Without this, a malformed post-fix JSON (e.g., {"date":"…"} with no
          # defects key) makes jq '.defects | length' return 0, which the gate
          # would interpret as "auditor improved!" and KEEP the broken briefing.
          if ! jq -e '.defects | type == "array"' sessions/audit-$DATE.json >/dev/null 2>&1; then
            echo "::warning::pre-fix audit JSON has no .defects array — schema drift, treating as revert"
            exit 0
          fi
          if ! jq -e '.defects | type == "array"' sessions/audit-$DATE.post-fix.json >/dev/null 2>&1; then
            echo "::warning::post-fix audit JSON has no .defects array — malformed/incomplete, treating as revert"
            exit 0
          fi
          PRE=$(jq '.defects | length' sessions/audit-$DATE.json)
          POST=$(jq '.defects | length' sessions/audit-$DATE.post-fix.json)
          if ! [[ "$PRE" =~ ^[0-9]+$ ]] || ! [[ "$POST" =~ ^[0-9]+$ ]]; then
            echo "::warning::jq returned non-integer (PRE=$PRE POST=$POST) — schema drift?, treating as revert"
            exit 0
          fi
          echo "pre-fix defects: $PRE / post-fix defects: $POST"
          if [ "$POST" -ge "$PRE" ]; then
            echo "::warning::auditor did not improve briefing (pre=$PRE post=$POST) — reverting briefing.html"
            git checkout sessions/briefing-$DATE.html
            # AUDITOR_REVERT already 1 from the defensive default above.
          else
            echo "::notice::auditor improved briefing ($PRE -> $POST defects)"
            echo "AUDITOR_REVERT=0" >> $GITHUB_ENV
          fi

      - name: Re-send revised briefing (gated)
        if: ${{ vars.JEEVES_AUDITOR_RESEND == '1' && vars.JEEVES_AUDITOR_AUTO_FIX == '1' && env.AUDITOR_REVERT != '1' }}
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          JEEVES_RECIPIENT_EMAIL: ${{ vars.JEEVES_RECIPIENT_EMAIL || 'lang.mc@gmail.com' }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          uv run python scripts/audit_resend.py --date "$DATE" || echo "re-send non-zero — continuing"

      - name: Commit audit + revised briefing artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "jeeves-bot"
          git config user.email "jeeves-bot@users.noreply.github.com"
          # F-009 — also stage audit-fix-*.json (was missing); pre-fix +
          # post-fix audit JSONs both committed for forensic record.
          git add sessions/audit-*.json sessions/audit-fix-*.json sessions/briefing-*.html 2>/dev/null || true
          if ! git diff --cached --quiet; then
            MSG="auditor: $(date -u +%Y-%m-%d) records"
            if [ "$AUDITOR_REVERT" = "1" ]; then
              MSG="$MSG (reverted — auditor regressed)"
            fi
            git commit -m "$MSG"
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            git push
          else
            echo "no audit changes to commit"
          fi

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-artifacts
          path: |
            sessions/audit-*.json
            sessions/audit-fix-*.json
            sessions/briefing-*.html
          if-no-files-found: ignore
          retention-days: 14
