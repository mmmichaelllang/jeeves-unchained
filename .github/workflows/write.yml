name: Jeeves — Write Phase

# 70 minutes after research begins. Briefing reaches Gmail around 7:30 AM PDT.
# 6:40 AM PDT (UTC-7) / 7:40 AM PST (UTC-8)
on:
  schedule:
    - cron: '40 13 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: "Session date YYYY-MM-DD (blank = today UTC)"
        required: false
        default: ""
      skip_send:
        description: "Generate HTML but do not send email"
        required: false
        default: "false"
      use_fixture:
        description: "Use canned mock session JSON instead of loading sessions/session-<date>.json. For smoke-testing the Groq + HTML path without running research first."
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Sync dependencies
        run: uv sync --no-dev

      - name: Run Jeeves write phase
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          JEEVES_RECIPIENT_EMAIL: ${{ vars.JEEVES_RECIPIENT_EMAIL || 'lang.mc@gmail.com' }}
        run: |
          uv run python scripts/write.py \
            ${{ github.event.inputs.date && format('--date {0}', github.event.inputs.date) || '' }} \
            ${{ github.event.inputs.skip_send == 'true' && '--skip-send' || '' }} \
            ${{ github.event.inputs.use_fixture == 'true' && '--use-fixture' || '' }}

      - name: Upload briefing HTML as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-html
          path: sessions/briefing-*.html
          if-no-files-found: ignore
          retention-days: 14
