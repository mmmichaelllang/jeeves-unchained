name: Jeeves — Write Phase (stub)

# 70 minutes after research begins. Briefing reaches Gmail around 7:30 AM PDT.
# 6:40 AM PDT (UTC-7) / 7:40 AM PST (UTC-8)
on:
  schedule:
    - cron: '40 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Sync dependencies
        run: uv sync --no-dev

      - name: Run Jeeves write phase (stub)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          uv run python scripts/write.py --plan-only
