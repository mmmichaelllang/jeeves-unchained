name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Sync dependencies (including dev)
        run: uv sync --all-extras

      - name: Run pytest
        run: uv run pytest -q

      - name: Dry-run research smoke test
        env:
          GITHUB_REPOSITORY: test/fixture
        run: uv run python scripts/research.py --dry-run --date 2026-04-23
