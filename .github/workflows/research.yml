name: Jeeves — Research Phase

# 30 minutes after correspondence so its draft can be imported.
# Write phase fires 70 minutes after this, so research must complete in <65 min.
# 5:30 AM PDT (UTC-7) / 6:30 AM PST (UTC-8)
on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit sectors (0 = no limit)"
        required: false
        default: "0"
      sectors:
        description: "Comma-separated sector whitelist"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Sync dependencies
        run: uv sync --no-dev --extra vertex

      - name: Run Jeeves research phase
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # Vertex AI grounded search (optional — disabled if not set)
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_REGION: ${{ secrets.GOOGLE_CLOUD_REGION || 'us-central1' }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          uv run python scripts/research.py \
            ${{ github.event.inputs.limit && format('--limit {0}', github.event.inputs.limit) || '' }} \
            ${{ github.event.inputs.sectors && format('--sectors {0}', github.event.inputs.sectors) || '' }}

      - name: Commit quota ledger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .quota-state.json ] && ! git diff --quiet .quota-state.json; then
            git config user.name "jeeves-bot"
            git config user.email "jeeves-bot@users.noreply.github.com"
            git add .quota-state.json
            git commit -m "quota: update counters $(date -u +%Y-%m-%d)"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push
          fi

      - name: Chain to Write Phase
        if: success() && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run write.yml --ref "${{ github.ref_name }}"
          echo "Write phase queued for ref ${{ github.ref_name }}"
